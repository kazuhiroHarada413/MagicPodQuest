<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 1 Cleared | GSS</title>
    <link rel="stylesheet" href="style.css">
    <script src="common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Mark stage 1 as cleared to unlock stage 2
            ProgressManager.markCleared(1);
        });
    </script>
</head>

<body>

    <header class="app-header">
        <a href="index.html" class="brand">
            <img src="images/icon-magicpod-color.svg" alt="MagicPod Logo">
            <span class="brand-text">GSS | Stage 1 Success</span>
        </a>
    </header>

    <main class="container">
        <div class="success-container fade-in">
            <div class="success-icon">🚀</div>
            <h1 class="success-title">クリック操作 成功！</h1>
            <h2 id="stage-clear" style="color: var(--success); margin-bottom: 2rem;">クリア！</h2>

            <div class="success-tips">
                <h4>💡 MagicPod Tips</h4>
                <p>MagicPodでは、画面内の目立つボタンやリンクをクリック（タップ）するだけで、簡単に操作のテストステップが作成できます。検証ステップを忘れずに追加し、3回実行して安定性を確認しましょう。</p>
            </div>

            <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                <a href="index.html" class="btn btn-secondary">コンソールへ戻る</a>
                <a href="stage2.html" id="btn-next-stage" class="btn btn-primary">次のステージへ</a>
            </div>
        </div>
    </main>

</body>

</html>
