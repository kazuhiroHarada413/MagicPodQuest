<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicPodQuest | Stage 7</title>
    <link rel="stylesheet" href="style.css">
    <script src="common.js"></script>
</head>

<body>
    <header class="app-header">
        <a href="index.html" class="brand">
            <img src="images/icon-magicpod-color.svg" alt="MagicPod Logo">
            <span class="brand-text">MagicPodQuest</span>
        </a>
        <div class="user-status">
            <span id="header-status">🟢 0/8 完了</span>
        </div>
    </header>

    <main class="container">
        <div class="panel">
            <div class="panel-header">
                <h1 class="panel-title">🟢 Stage 7: アラートの操作 <span
                        style="font-size: 0.6em; margin-left: 1rem; color: var(--text-muted);">(緊急オーバーライド)</span></h1>
            </div>

            <div class="panel-body">
                <div class="update-history">
                    <span class="version-tag">v1.6:</span> 安全ロック解除のため、ブラウザのアラート（確認ダイアログ）に同意する機能を追加しました。<br>
                    <span style="color: var(--danger); font-size: 0.9em;">※「アラートのOKボタンを押す」コマンドを使用して突破してください。</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="probe-name">探査機名</label>
                    <input type="text" id="probe-name" class="form-control" placeholder="例: Voyager-1" required>
                    <div id="error-probe" class="error-text">⚠️ 探査機名が未入力です</div>
                </div>

                <div class="form-group" style="display: flex; gap: 2rem;">
                    <div style="flex: 1;">
                        <label class="form-label" for="target-planet">探査先</label>
                        <select id="target-planet" class="form-control" required>
                            <option value="">-- プルダウンから選択 --</option>
                            <option value="mars">火星 (Mars)</option>
                            <option value="jupiter">木星 (Jupiter)</option>
                            <option value="saturn">土星 (Saturn)</option>
                        </select>
                        <div id="error-planet" class="error-text">⚠️ 探査先が選択されていません</div>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label class="form-label">動力源</label>
                    <div style="display: flex; gap: 1.5rem; margin-top: 0.5rem;">
                        <label style="cursor: pointer;"><input type="radio" name="power-source" value="solar">
                            ソーラーパネル</label>
                        <label style="cursor: pointer;"><input type="radio" name="power-source" value="nuclear">
                            原子力電池</label>
                    </div>
                    <div id="error-power" class="error-text">⚠️ 動力源が選択されていません</div>
                </div>

                <div style="text-align: right; margin-top: 2rem;">
                    <button class="btn btn-secondary fade-in" id="btn-override">🔒 安全ロック解除</button>
                    <!-- Loading State -->
                    <div id="loading-indicator" class="hidden fade-in"
                        style="display: none; justify-content: flex-end; align-items: center; gap: 1rem; color: var(--primary);">
                        <span>📡 通信確立中...</span>
                        <div class="spinner"
                            style="width: 20px; height: 20px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;">
                        </div>
                    </div>
                    <button class="btn btn-primary hidden fade-in" id="btn-action" style="margin-top: 1rem;">🚀 調査開始
                        (完了)</button>
                </div>

            </div>
        </div>
    </main>

    <footer class="app-footer">
        <p>Powered by MagicPod UI Simulation Engine</p>
    </footer>

    <style>
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnOverride = document.getElementById('btn-override');
            const loadingIndicator = document.getElementById('loading-indicator');
            const btnAction = document.getElementById('btn-action');
            const probeName = document.getElementById('probe-name');
            const targetPlanet = document.getElementById('target-planet');
            const errorProbe = document.getElementById('error-probe');
            const errorPlanet = document.getElementById('error-planet');
            const errorPower = document.getElementById('error-power');

            let isUnlocked = false;

            btnOverride.addEventListener('click', () => {
                const confirmed = confirm("⚠️ 警告：安全ロックを解除しますか？\n（この操作は元に戻せません）");
                if (confirmed) {
                    isUnlocked = true;
                    btnOverride.classList.add('hidden');

                    loadingIndicator.classList.remove('hidden');
                    loadingIndicator.style.display = 'flex';

                    setTimeout(() => {
                        loadingIndicator.style.display = 'none';
                        loadingIndicator.classList.add('hidden');
                        btnAction.classList.remove('hidden');
                    }, 3000);
                }
            });

            btnAction.addEventListener('click', () => {
                let isValid = true;

                if (!isUnlocked) {
                    alert("ロックが解除されていません");
                    return;
                }

                if (!probeName.value.trim()) {
                    errorProbe.classList.add('visible');
                    isValid = false;
                } else {
                    errorProbe.classList.remove('visible');
                }

                if (!targetPlanet.value) {
                    errorPlanet.classList.add('visible');
                    isValid = false;
                } else {
                    errorPlanet.classList.remove('visible');
                }

                const powerRadios = document.querySelectorAll('input[name="power-source"]');
                const isPowerSelected = Array.from(powerRadios).some(radio => radio.checked);
                if (!isPowerSelected) {
                    errorPower.classList.add('visible');
                    isValid = false;
                } else {
                    errorPower.classList.remove('visible');
                }

                if (isValid) {
                    window.location.href = 'stage7-success.html';
                }
            });
        });
    </script>
</body>

</html>
