<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicPodQuest | Stage 8 クリア</title>
    <link rel="stylesheet" href="style.css">
    <script src="common.js"></script>
</head>

<body>
    <header class="app-header">
        <a href="index.html" class="brand">
            <img src="images/icon-magicpod-color.svg" alt="MagicPod Logo">
            <span class="brand-text">MagicPodQuest</span>
        </a>
    </header>

    <main class="container">
        <div class="success-container fade-in">
            <div class="success-icon" style="font-size: 6rem;">🎉</div>
            <h1 class="success-title">マウスオーバー・全ミッション 成功！</h1>
            <h2 id="stage-clear" style="color: var(--success); margin-bottom: 2rem;">入門編 マスタークラス達成！</h2>

            <div class="success-tips">
                <h4>💡 MagicPod攻略のヒント</h4>
                <p>PCブラウザでは「マウスを重ねた時だけ」表示されるメニュー（ツールチップやドロップダウン）がよくあります。「マウスオーバー」や「指定位置クリック」のコマンドを使うことで、手動操作と同じように見えない隠し要素を的確に現れさせることができます。<br><br>
                    <strong>👏 これでMagicPodの全基礎コマンドのマスターです！</strong>実際のプロダクトでの自動化にどんどん挑戦しましょう！
                </p>
            </div>

            <a href="index.html" class="btn btn-primary" style="margin-top: 2rem;">ホーム画面へ戻る</a>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            ProgressManager.markCleared(8);
        });
    </script>
</body>

</html>
