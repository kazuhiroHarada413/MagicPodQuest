<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 3 Cleared | GSS</title>
    <link rel="stylesheet" href="style.css">
    <script src="common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Mark stage 3 as cleared to unlock next stage
            ProgressManager.markCleared(3);
        });
    </script>
</head>

<body>

    <header class="app-header">
        <a href="index.html" class="brand">
            <img src="images/icon-magicpod-color.svg" alt="MagicPod Logo">
            <span class="brand-text">GSS | Stage 3 Success</span>
        </a>
    </header>

    <main class="container">
        <div class="success-container fade-in">
            <div class="success-icon">📝</div>
            <h1 class="success-title">テキスト入力 成功！</h1>
            <h2 id="stage-clear" style="color: var(--success); margin-bottom: 2rem;">クリア！</h2>

            <div class="success-tips">
                <h4>💡 MagicPod Tips</h4>
                <p>テキストの入力もMagicPodを使えば簡単です。特定の入力値に対するバリデーション（エラーメッセージが出るかなど）をテストしたい場合は、「入力せずにボタンを押す」→「エラーテキストを検証する」というステップでテストを組むことができます。正常系だけでなく異常系もテストケースに組み込んでみましょう。
                </p>
            </div>

            <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                <a href="index.html" class="btn btn-secondary">コンソールへ戻る</a>
                <a href="stage4.html" id="btn-next-stage" class="btn btn-primary">次のステージへ</a>
            </div>
        </div>
    </main>

</body>

</html>
