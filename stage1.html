<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 1 | GSS</title>
    <link rel="stylesheet" href="style.css">
    <script src="common.js"></script>
</head>

<body>

    <header class="app-header">
        <a href="index.html" class="brand">
            <img src="images/icon-magicpod-color.svg" alt="MagicPod Logo">
            <span class="brand-text">GSS | Stage 1</span>
        </a>
    </header>

    <main class="container">
        <div class="panel">
            <div class="panel-header">
                <h1 class="panel-title">🟢 Stage 1: システム起動</h1>
            </div>

            <div class="panel-body">
                <div class="update-history">
                    <div><span class="version-tag">更新履歴: v1.0</span></div>
                    <div style="margin-top: 0.5rem">・初回リリース：通信システム用の大きな開始ボタンを設置しました。</div>
                </div>

                <!-- 1つの大きなシステムの中で要素が追加されていくスタイル -->
                <div id="app-area"
                    style="margin: 3rem auto; max-width: 600px; padding: 2rem; border: 1px solid var(--border); border-radius: 8px; background: rgba(0, 0, 0, 0.3);">

                    <h2
                        style="font-family: 'Orbitron', sans-serif; color: #4da8da; margin-bottom: 2rem; text-align: center;">
                        SPACE COM LINK</h2>

                    <div id="action-section" style="text-align: center; margin-top: 2rem;">
                        <button id="btn-action" class="btn btn-primary" style="padding: 1.5rem 3rem; font-size: 1.2rem;"
                            onclick="doAction()">通信開始</button>
                        <div id="error-msg" class="error-text"></div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <a href="index.html" class="btn btn-secondary">← GSSコンソールへ戻る</a>
    </footer>

    <script>
        function doAction() {
            // v1.0: Click immediately goes to success
            window.location.href = "stage1-success.html";
        }
    </script>

</body>

</html>
