<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 5 | GSS</title>
    <link rel="stylesheet" href="style.css">
    <script src="common.js"></script>
</head>

<body>

    <header class="app-header">
        <a href="index.html" class="brand">
            <img src="images/icon-magicpod-color.svg" alt="MagicPod Logo">
            <span class="brand-text">GSS | Stage 5</span>
        </a>
    </header>

    <main class="container">
        <div class="panel">
            <div class="panel-header">
                <h1 class="panel-title">🟢 Stage 5: 免責事項の同意</h1>
            </div>

            <div class="panel-body">

                <div class="update-history">
                    <div><span class="version-tag">更新履歴: v1.4</span></div>
                    <div style="margin-top: 0.5rem">・規約変更に伴い、免責事項の同意ボタンを最下部に移動しました。同意するまでシステムは表示されません。</div>
                </div>

                <div id="app-area"
                    style="margin: 3rem auto; max-width: 600px; padding: 2rem; border: 1px solid var(--border); border-radius: 8px; background: rgba(0, 0, 0, 0.3);">

                    <h2
                        style="font-family: 'Orbitron', sans-serif; color: #4da8da; margin-bottom: 2rem; text-align: center;">
                        SPACE COM LINK</h2>

                    <!-- TOS Section -->
                    <div id="tos-section">
                        <h3 style="margin-bottom: 1rem; color: var(--text-muted); font-size: 1.1rem;">利用規約・免責事項の確認</h3>
                        <div
                            style="height: 1200px; position: relative; background: rgba(0,0,0,0.5); padding: 1.5rem; border: 1px solid var(--border); border-radius: 8px;">
                            <div style="position: absolute; top: 100px; color: var(--text-muted); opacity: 0.5;">
                                [非常に長い規約文が続きます...] <br><br>
                                ↓ スクロールしてください ↓
                            </div>

                            <div style="position: absolute; bottom: 500px; color: var(--text-muted); opacity: 0.5;">
                                [まだまだ続きます...] <br><br>
                                ↓ さらにスクロールしてください ↓
                            </div>

                            <div
                                style="position: absolute; bottom: 0; width: calc(100% - 3rem); text-align: center; border-top: 1px dashed var(--border); padding: 2rem 0;">
                                <button id="btn-agree" class="btn btn-secondary" style="padding: 1rem 3rem;"
                                    onclick="agreeTOS()">全てに同意してシステムを開く</button>
                            </div>
                        </div>
                    </div>

                    <!-- Form Section (Hidden until TOS agreed) -->
                    <div id="form-section" class="hidden fade-in">
                        <div id="config-section"
                            style="margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px dashed var(--border);">
                            <div class="form-group">
                                <label class="form-label" for="target-planet">探査先 (目的地) <span
                                        style="color: var(--danger);">*</span></label>
                                <select id="target-planet" class="form-control" style="cursor: pointer;">
                                    <option value="">-- 行き先を選択 --</option>
                                    <option value="Mars">火星 (Mars)</option>
                                    <option value="Jupiter">木星 (Jupiter)</option>
                                    <option value="Saturn">土星 (Saturn)</option>
                                </select>
                            </div>

                            <div class="form-group" style="margin-top: 1.5rem;">
                                <label class="form-label">主動力源 <span style="color: var(--danger);">*</span></label>
                                <div style="display: flex; gap: 2rem; margin-top: 0.5rem;">
                                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                        <input type="radio" name="power-source" value="ソーラー"> ソーラー
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                        <input type="radio" name="power-source" value="RTG"> 原子力 (RTG)
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div id="name-section" class="form-group">
                            <label class="form-label" for="probe-name">探査機名称 <span
                                    style="color: var(--danger);">*</span></label>
                            <input type="text" id="probe-name" class="form-control" placeholder="例：ボイジャーX号">
                        </div>

                        <div id="action-section" style="text-align: center; margin-top: 2rem;">
                            <button id="btn-action" class="btn btn-primary"
                                style="padding: 1.5rem 3rem; font-size: 1.2rem;" onclick="doAction()">通信開始</button>
                            <div id="error-msg" class="error-text"></div>

                            <div id="loader" class="hidden" style="margin-top: 1rem; color: var(--primary);">
                                <div style="font-size: 2rem; margin-bottom: 1rem; animation: bounce 1s infinite;">📡
                                </div>
                                <p>通信要求を送信中... 応答を待機しています</p>
                            </div>

                            <div id="result" class="hidden fade-in" style="margin-top: 2rem;">
                                <a href="stage5-success.html" id="btn-result" class="btn btn-primary">結果を確認</a>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <a href="index.html" class="btn btn-secondary">← GSSコンソールへ戻る</a>
    </footer>

    <script>
        function agreeTOS() {
            document.getElementById('tos-section').classList.add('hidden');
            document.getElementById('form-section').classList.remove('hidden');
        }

        function doAction() {
            const planetEl = document.getElementById('target-planet');
            const powerEls = document.getElementsByName('power-source');

            const isPlanetSelected = planetEl.value !== "";
            let power = "";
            for (const el of powerEls) {
                if (el.checked) { power = el.value; break; }
            }

            const probeName = document.getElementById('probe-name').value.trim();
            const errorMsg = document.getElementById('error-msg');

            if (!isPlanetSelected || !power) {
                errorMsg.textContent = "⚠️ エラー：探査先と動力源を両方選択してください。";
                errorMsg.classList.add('visible');
                return;
            }
            if (!probeName) {
                errorMsg.textContent = "⚠️ エラー：探査機名称を入力してください。";
                errorMsg.classList.add('visible');
                return;
            }

            errorMsg.classList.remove('visible');
            document.getElementById('btn-action').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');

            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('result').classList.remove('hidden');
            }, 3000);
        }
    </script>

</body>

</html>
