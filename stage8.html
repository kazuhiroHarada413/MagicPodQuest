<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicPodQuest | Stage 8</title>
    <link rel="stylesheet" href="style.css">
    <script src="common.js"></script>
</head>

<body>
    <header class="app-header">
        <a href="index.html" class="brand">
            <img src="images/icon-magicpod-color.svg" alt="MagicPod Logo">
            <span class="brand-text">MagicPodQuest</span>
        </a>
        <div class="user-status">
            <span id="header-status">🟢 0/8 完了</span>
        </div>
    </header>

    <main class="container">
        <div class="panel">
            <div class="panel-header">
                <h1 class="panel-title">🟢 Stage 8: マウスオーバー <span
                        style="font-size: 0.6em; margin-left: 1rem; color: var(--text-muted);">(隠しパスコード)</span></h1>
            </div>

            <div class="panel-body">
                <div class="update-history">
                    <span class="version-tag">v1.7:</span> セキュリティパネルを追加しました。センサー部分にマウスを重ねて、隠しパスコードパネルを展開してください。<br>
                    <span
                        style="color: var(--danger); font-size: 0.9em;">※「マウスオーバー」または「指定位置クリック」を使って隠し要素を表示させましょう。</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="probe-name">探査機名</label>
                    <input type="text" id="probe-name" class="form-control" value="Auto-Probe-X" required>
                </div>
                <div class="form-group" style="display: flex; gap: 2rem;">
                    <div style="flex: 1;">
                        <label class="form-label" for="target-planet">探査先</label>
                        <select id="target-planet" class="form-control" required>
                            <option value="">-- 行き先を選択 --</option>
                            <option value="Mars">火星 (Mars)</option>
                            <option value="Jupiter">木星 (Jupiter)</option>
                            <option value="Saturn">土星 (Saturn)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 1rem;">
                    <label class="form-label">動力源</label>
                    <div style="display: flex; gap: 1.5rem; margin-top: 0.5rem;">
                        <label style="cursor: pointer;"><input type="radio" name="power-source" value="solar" checked>
                            ソーラーパネル</label>
                        <label style="cursor: pointer;"><input type="radio" name="power-source" value="nuclear">
                            原子力電池</label>
                    </div>
                </div>

                <hr style="border: none; border-top: 1px solid var(--border); margin: 2rem 0;">

                <div style="margin-top: 1rem;">
                    <div id="hover-sensor"
                        style="background-color: var(--bg-color-alt); border: 2px dashed var(--primary); padding: 1.5rem; text-align: center; border-radius: 8px; cursor: crosshair;">
                        <span style="font-family: 'Orbitron', sans-serif;">[HOVER ZONE] ここにマウスを重ねる</span>

                        <div id="hidden-panel" class="hidden"
                            style="margin-top: 1.5rem; padding: 1.5rem; background: rgba(0,0,0,0.5); border-radius: 8px; text-align: left;">
                            <label class="form-label" for="passcode">パスコード入力</label>
                            <div style="display: flex; gap: 1rem;">
                                <input type="password" id="passcode" class="form-control" placeholder="何でもOK" required>
                                <button class="btn btn-secondary" id="btn-override">ロック解除</button>
                            </div>
                            <div id="error-passcode" class="error-text">⚠️ パスコードが未入力です</div>
                        </div>
                    </div>
                </div>

                <div style="text-align: right; margin-top: 2rem;">
                    <div id="loading-indicator" class="hidden fade-in"
                        style="display: none; justify-content: flex-end; align-items: center; gap: 1rem; color: var(--primary);">
                        <span>📡 パスコード検証中...</span>
                        <div class="spinner"
                            style="width: 20px; height: 20px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;">
                        </div>
                    </div>
                    <button class="btn btn-primary hidden fade-in" id="btn-action" style="margin-top: 1rem;">🚀
                        発射シーケンス開始 (クリア)</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <p>Powered by MagicPod UI Simulation Engine</p>
    </footer>

    <style>
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sensor = document.getElementById('hover-sensor');
            const hiddenPanel = document.getElementById('hidden-panel');
            const btnOverride = document.getElementById('btn-override');
            const passcode = document.getElementById('passcode');
            const errorPasscode = document.getElementById('error-passcode');
            const loadingIndicator = document.getElementById('loading-indicator');
            const btnAction = document.getElementById('btn-action');

            let isUnlocked = false;

            sensor.addEventListener('mouseenter', () => {
                hiddenPanel.classList.remove('hidden');
            });
            // Intentionally not handling mouseleave so the panel stays open to type.

            btnOverride.addEventListener('click', () => {
                if (passcode.value.length > 0) {
                    errorPasscode.classList.remove('visible');

                    const confirmed = confirm("⚠️ 警告：機密エリアへのアクセスです。本当に解除しますか？");
                    if (confirmed) {
                        isUnlocked = true;
                        loadingIndicator.classList.remove('hidden');
                        loadingIndicator.style.display = 'flex';
                        btnOverride.classList.add('hidden');
                        passcode.disabled = true;

                        setTimeout(() => {
                            loadingIndicator.style.display = 'none';
                            loadingIndicator.classList.add('hidden');
                            btnAction.classList.remove('hidden');
                        }, 3000);
                    }
                } else {
                    errorPasscode.classList.add('visible');
                }
            });

            btnAction.addEventListener('click', () => {
                if (isUnlocked) {
                    window.location.href = 'stage8-success.html';
                }
            });
        });
    </script>
</body>

</html>
