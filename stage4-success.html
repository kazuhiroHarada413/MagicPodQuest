<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 4 Cleared | GSS</title>
    <link rel="stylesheet" href="style.css">
    <script src="common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Mark stage 4 as cleared to unlock next stage
            ProgressManager.markCleared(4);
        });
    </script>
</head>

<body>

    <header class="app-header">
        <a href="index.html" class="brand">
            <img src="images/icon-magicpod-color.svg" alt="MagicPod Logo">
            <span class="brand-text">GSS | Stage 4 Success</span>
        </a>
    </header>

    <main class="container">
        <div class="success-container fade-in">
            <div class="success-icon">⚙️</div>
            <h1 class="success-title">複雑なフォーム入力 成功！</h1>
            <h2 id="stage-clear" style="color: var(--success); margin-bottom: 2rem;">クリア！</h2>

            <div class="success-tips">
                <h4>💡 MagicPod Tips</h4>
                <p>ドロップダウン（セレクトボックス）やラジオボタンも、基本的には要素を選んでクリックするだけで自動記録されます。もし特殊な作りのドロップダウン（UIライブラリなどで作られた、標準のselectタグではないもの）がある場合は、開くボタンのクリック→選択肢のクリック
                    という２段階のステップが必要になることも覚えておいてください。</p>
            </div>

            <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                <a href="index.html" class="btn btn-secondary">コンソールへ戻る</a>
                <a href="stage5.html" id="btn-next-stage" class="btn btn-primary">次のステージへ</a>
            </div>
        </div>
    </main>

</body>

</html>
