<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicPodQuest | Stage 7 クリア</title>
    <link rel="stylesheet" href="style.css">
    <script src="common.js"></script>
</head>

<body>
    <header class="app-header">
        <a href="index.html" class="brand">
            <img src="images/icon-magicpod-color.svg" alt="MagicPod Logo">
            <span class="brand-text">MagicPodQuest</span>
        </a>
    </header>

    <main class="container">
        <div class="success-container fade-in">
            <div class="success-icon">⚠️</div>
            <h1 class="success-title">アラート操作 成功！</h1>
            <h2 id="stage-clear" style="color: var(--success); margin-bottom: 2rem;">クリア！</h2>

            <div class="success-tips">
                <h4>💡 MagicPod攻略のヒント</h4>
                <p>ブラウザ標準のアラート（ポップアップ）は通常のUI操作では取得できないため、専用の<strong>「アラートのOKボタンを押す」コマンド</strong>が用意されています。<br>このコマンドはアラートが表示される「直後」に配置することで動作します！
                </p>
            </div>

            <a href="index.html" class="btn btn-primary" style="margin-top: 2rem;">次のミッションへ戻る</a>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            ProgressManager.markCleared(7);
        });
    </script>
</body>

</html>
